name: BigData - Ingesta CoinGecko

on:
  push:
    branches: [ master ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    name: Ingestión de Datos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl lxml

      # ── EA1 ───────────────────────────────────────────────────
      - name: Ejecutar ingestion.py (EA1)
        run: python src/ingestion.py

      - name: Verificar archivos EA1
        run: |
          echo "── BD ──"      && ls -lh src/db/
          echo "── CSV ──"     && ls -lh src/xlsx/
          echo "── Auditoría EA1 ──" && cat src/static/auditoria/ingestion.txt

      # ── EA2 ───────────────────────────────────────────────────
      - name: Instalar Java (PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar dependencias EA2
        run: pip install pyspark

      - name: Ejecutar cleaning.py (EA2)
        run: python src/cleaning.py

      - name: Verificar archivos EA2
        run: |
          echo "── CSV limpio ──" && ls -lh src/xlsx/
          echo "── Auditoría EA2 ──" && cat src/static/auditoria/cleaning_report.txt

      # ── EA3 ───────────────────────────────────────────────────
      - name: Ejecutar enrichment.py (EA3)
        run: python src/enrichment.py

      - name: Verificar archivos EA3
        run: |
          echo "── CSV enriquecido ──" && ls -lh src/xlsx/
          echo "── Auditoría EA3 ──"   && cat src/static/auditoria/enrichment_report.txt

      # ── Artefactos ────────────────────────────────────────────
      - name: Publicar artefactos
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-${{ github.run_number }}
          path: |
            src/db/ingestion.db
            src/xlsx/muestra.csv
            src/xlsx/cleaned_data.csv
            src/xlsx/enriched_data.csv
            src/static/auditoria/ingestion.txt
            src/static/auditoria/cleaning_report.txt
            src/static/auditoria/enrichment_report.txt
          retention-days: 30

      - name: Commit archivos generados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/db/ src/xlsx/ src/static/
          git diff --staged --quiet || git commit -m "ci: evidencias EA1+EA2+EA3 [run #${{ github.run_number }}]"
          git push
