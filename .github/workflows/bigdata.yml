name: BigData - Ingesta CoinGecko

on:
  push:
    branches: [ main ]
  schedule:
    # Ejecuta todos los días a las 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:   # permite ejecución manual desde GitHub

jobs:
  ingest:
    name: Ingestión de Datos
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout del repositorio ────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Configurar Python ───────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Instalar dependencias ───────────────────────────────
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      # ── 4. Ejecutar script de ingesta ──────────────────────────
      - name: Ejecutar ingestion.py
        run: python src/ingestion.py

      # ── 5. Verificar archivos generados ───────────────────────
      - name: Verificar archivos generados
        run: |
          echo "── Base de datos ──"
          ls -lh src/db/
          echo "── CSV muestra ──"
          ls -lh src/xlsx/
          echo "── Auditoría ──"
          ls -lh src/static/auditoria/
          echo "── Contenido auditoría ──"
          cat src/static/auditoria/ingestion.txt

      # ── 6. Publicar artefactos ─────────────────────────────────
      - name: Publicar artefactos
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-ingesta-${{ github.run_number }}
          path: |
            src/db/ingestion.db
            src/xlsx/muestra.csv
            src/static/auditoria/ingestion.txt
          retention-days: 30

      # ── 7. Commit automático de evidencias al repo ─────────────
      - name: Commit archivos generados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/db/ src/xlsx/ src/static/
          git diff --staged --quiet || git commit -m "ci: actualización automática de evidencias [run #${{ github.run_number }}]"
          git push
