name: BigData - Ingesta CoinGecko

on:
  push:
    branches: [ master ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    name: Ingestión de Datos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Ejecutar ingestion.py
        run: python src/ingestion.py

      - name: Verificar archivos generados (EA1)
        run: |
          echo "── Base de datos ──"
          ls -lh src/db/
          echo "── CSV muestra ──"
          ls -lh src/xlsx/
          echo "── Auditoría EA1 ──"
          cat src/static/auditoria/ingestion.txt

      # ── EA2: Preprocesamiento ──────────────────────────────────
      - name: Instalar Java (requerido por PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar dependencias EA2
        run: pip install pyspark openpyxl

      - name: Ejecutar cleaning.py
        run: python src/cleaning.py

      - name: Verificar archivos generados (EA2)
        run: |
          echo "── Excel limpio ──"
          ls -lh src/xlsx/
          echo "── Auditoría EA2 ──"
          cat src/static/auditoria/cleaning_report.txt

      - name: Publicar artefactos
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-${{ github.run_number }}
          path: |
            src/db/ingestion.db
            src/xlsx/muestra.csv
            src/xlsx/cleaned_data.xlsx
            src/static/auditoria/ingestion.txt
            src/static/auditoria/cleaning_report.txt
          retention-days: 30

      - name: Commit archivos generados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/db/ src/xlsx/ src/static/
          git diff --staged --quiet || git commit -m "ci: actualización automática de evidencias [run #${{ github.run_number }}]"
          git push
